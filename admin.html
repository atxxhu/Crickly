<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crickly – Admin Panel</title>

  <!-- GOOGLE FONT -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- GLOBAL CSS -->
  <link rel="stylesheet" href="style.css">

</head>

<body>


<!-- ======================================================
     LOADER
====================================================== -->
<div id="pageLoader" class="page-loader">

  <div class="loader-inner">
    <div class="loader-spinner"></div>
    <div class="loader-text">CRICKLY</div>
  </div>

</div>


<!-- ======================================================
     HEADER
====================================================== -->
<div class="admin-header">

  <h1>ADMIN PANEL</h1>
  <p>Manage Live Matches</p>

  <button class="btn logout-btn" id="logoutBtn">
    Logout
  </button>

</div>


<div class="admin-container">


  <!-- ======================================================
       PLAYER 1 (JWPLAYER)
  ====================================================== -->
  <div class="admin-card">

    <h2>Player 1 (JW PLAYER)</h2>

    <div class="form-group">
      <input type="text" id="m3u8Title" placeholder="Match title">
    </div>

    <div class="form-group">
      <input type="text" id="m3u8Poster" placeholder="Poster image URL">
    </div>

    <div class="form-group">
      <input type="text" id="m3u8Url" placeholder="Stream URL (.m3u8 or .mpd)">
    </div>

    <!-- NEW -->
    <div class="form-group">
      <input type="text" id="m3u8Kid" placeholder="KID (only for MPD ClearKey)">
    </div>

    <!-- NEW -->
    <div class="form-group">
      <input type="text" id="m3u8Key" placeholder="KEY (only for MPD ClearKey)">
    </div>

    <div class="form-group">
      <select id="m3u8Status">
        <option value="live">LIVE</option>
        <option value="upcoming">UPCOMING</option>
      </select>
    </div>

    <button class="btn primary-btn" id="addM3u8Btn">
      Add Player 1 Match
    </button>

  </div>



  <!-- ======================================================
       PLAYER 2 (SHAKA PLAYER)
  ====================================================== -->
  <div class="admin-card">

    <h2>Player 2 (SHAKA PLAYER)</h2>

    <div class="form-group">
      <input type="text" id="mpdTitle" placeholder="Match title">
    </div>

    <div class="form-group">
      <input type="text" id="mpdPoster" placeholder="Poster image URL">
    </div>

    <div class="form-group">
      <input type="text" id="mpdUrl" placeholder="MPD URL (.mpd)">
    </div>

    <div class="form-group">
      <input type="text" id="mpdCookie" placeholder="__hdnea__ cookie">
    </div>

    <div class="form-group">
      <input type="text" id="mpdKid" placeholder="KID (hex)">
    </div>

    <div class="form-group">
      <input type="text" id="mpdKey" placeholder="KEY (hex)">
    </div>

    <div class="form-group">
      <select id="mpdStatus">
        <option value="live">LIVE</option>
        <option value="upcoming">UPCOMING</option>
      </select>
    </div>

    <button class="btn primary-btn" id="addMpdBtn">
      Add Player 2 Match
    </button>

  </div>

<!-- ======================================================
     PLAYER 3 (FANCODE PLAYER)
====================================================== -->
<div class="admin-card">

  <h2>Player 3 (FANCODE PLAYER)</h2>

  <div class="form-group">
    <input type="text" id="fcTitle" placeholder="Match title">
  </div>

  <div class="form-group">
    <input type="text" id="fcPoster" placeholder="Poster image URL">
  </div>

  <div class="form-group">
    <input type="text" id="fcUrl" placeholder="FanCode Stream URL (.m3u8)">
  </div>

  <div class="form-group">
    <select id="fcStatus">
      <option value="live">LIVE</option>
      <option value="upcoming">UPCOMING</option>
    </select>
  </div>

  <button class="btn primary-btn" id="addFcBtn">
    Add FanCode Match
  </button>

</div>

  <!-- ======================================================
       MANAGE MATCHES
  ====================================================== -->
  <div class="admin-card">

    <h2>Manage Matches</h2>

    <div id="adminMatchList"></div>

  </div>


</div>



<!-- ======================================================
     ADMIN SCRIPT
====================================================== -->
<script type="module" src="admin.js"></script>



<!-- ======================================================
     LOADER HIDE
====================================================== -->
<script>

window.addEventListener("load", () => {
  document.getElementById("pageLoader")?.classList.add("hide");
});

</script>

</body>
</html>
