<!DOCTYPE html>
<html lang="en">

<head>

  <!-- =========================================
       META
  ========================================== -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="referrer" content="no-referrer">
  <title>Crickly – Live Player</title>


  <!-- =========================================
       ADS SCRIPT
  ========================================== -->
  <script>
    (function (s) {
      s.dataset.zone = '10653603';
      s.src = 'https://al5sm.com/tag.min.js';
    })(
      [document.documentElement, document.body]
        .filter(Boolean)
        .pop()
        .appendChild(document.createElement('script'))
    );
  </script>


  <!-- =========================================
       GOOGLE FONT
  ========================================== -->
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  >


  <!-- =========================================
       GLOBAL CSS
  ========================================== -->
  <link rel="stylesheet" href="style.css">


  <!-- =========================================
       SHAKA PLAYER (JS + CSS)
  ========================================== -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.ui.min.js"></script>

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/controls.min.css"
  >

</head>


<body class="player-page">


  <!-- =========================================
       PAGE LOADER
  ========================================== -->
  <div id="pageLoader" class="page-loader">

    <div class="loader-inner">
      <div class="loader-spinner"></div>
      <div class="loader-text">CRICKLY</div>
    </div>

  </div>


  <!-- =========================================
       MAIN CONTENT
  ========================================== -->
  <div class="home-container">

    <!-- ===== MATCH TITLE ===== -->
    <div class="player-title-card">
      <h2 id="matchTitle" class="player-title-text">Loading…</h2>
    </div>


    <!-- ===== PLAYER CARD ===== -->
    <div class="player-card">

      <!-- Live Users -->
      <div class="live-users-card">
        <span class="live-dot"></span>
        <span id="liveUserCount">0</span> Live
      </div>

      <!-- Video Player -->
      <div class="player-inner shaka-video-container" data-shaka-player>
        <video id="video" autoplay playsinline muted></video>
      </div>

    </div>


    <!-- ===== ACTION BUTTONS ===== -->
    <div class="action-card">

      <button id="shareLinkBtn" class="action-btn">
        🔗 Share
      </button>

      <a href="index.html" class="action-btn back-btn">
        ⬅ Home
      </a>

    </div>

  </div>


  <!-- =========================================
       TELEGRAM POPUP
  ========================================== -->
  <div class="tg-overlay" id="tgOverlay">

    <div class="tg-popup">

      <h3>JOIN CRICKLY</h3>

      <p>
        Join our Telegram channel for live match updates.
      </p>

      <div class="tg-actions">

        <a href="https://telegram.me/+NSqV0ZHy3flhZmQ1"
           target="_blank"
           class="tg-join"
           onclick="closeTelegramPopup()">
          Join Telegram
        </a>

        <button class="tg-already" onclick="closeTelegramPopup()">
          Already Joined
        </button>

      </div>

    </div>

  </div>


  <!-- =========================================
       PLAYER SCRIPT
  ========================================== -->
  <script type="module" src="player3.js"></script>


  <!-- =========================================
       FOOTER
  ========================================== -->
  <footer class="site-footer">
    <div class="footer-copy">
      © 2026 Crickly | Made With Love
    </div>
  </footer>


  <!-- =========================================
       LOADER + TELEGRAM LOGIC
  ========================================== -->
  <script>

    /* ===== Telegram Popup ===== */
    const tgOverlay = document.getElementById("tgOverlay");

    if (tgOverlay) {
      tgOverlay.style.display = "flex";
    }

    function closeTelegramPopup() {
      if (tgOverlay) tgOverlay.style.display = "none";
    }


    /* ===== Page Loader ===== */
    window.addEventListener("load", () => {
      const loader = document.getElementById("pageLoader");

      if (loader) {
        loader.classList.add("hide");
      }
    });

  </script>

</body>
</html>
